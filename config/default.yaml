random_seed: 42

dataset_name: mitbih
dataset_path: BD2-20260218T192722Z-1-001/BD2

models:
  - kmeans
  - dbscan
  - hdbscan
  - autoencoder

# Representacion: "signal_pca" (Path A) o "manual_features" (Path B) con ventanas temporales
representation: manual_features

# Senal ECG
sampling_rate: 360
before_r_samples: 90
after_r_samples: 110
filter_lowcut: 0.5
filter_highcut: 40.0
filter_order: 4

# PCA (Path A)
pca_variance_threshold: 0.95

# Registros excluidos (ritmos de marcapasos - recomendacion AAMI)
excluded_records:
  - "102"
  - "104"
  - "107"
  - "217"

# ============================================================
# Hiperparametros de modelos
# ============================================================

# K-Means: k=5 clusters (analisis de codo+silhouette en notebook 04;
# k=10 no estaba justificado y producia clusters degenerados) +
# distance-scoring normalizado por dispersion de cluster.
# threshold_method="iqr": el umbral se deriva de la valla de Tukey
# (Q3 + 1.5*IQR) sobre la distribucion de scores, SIN consultar las
# etiquetas AAMI. Esto preserva el caracter no supervisado del metodo.
# Se prefirio sobre el metodo del codo (Satopaa et al. 2011) porque ese
# metodo colapsa con la cola extrema de scores que produce la correccion
# de la paradoja del singleton (ver kmeans.py); la valla de Tukey, basada
# en cuartiles, es robusta a esa cola.
# distance_percentile y min_cluster_size quedan como parametros del modo
# alternativo (percentil), usado solo para el analisis de sensibilidad
# reportado en la seccion 9c del notebook 05.
kmeans_params:
  n_clusters: 5
  random_state: 42
  n_init: 20
  threshold_method: iqr
  distance_percentile: 89.5   # no usado con threshold_method=iqr
  min_cluster_size: 10        # clusters con menos miembros se consideran degenerados

# DBSCAN: eps auto-calibrado por k-distancias.
# eps_percentile subido de 75 -> 90 para acercarse al "codo" de la
# curva de k-distancias (metodo canonico de Ester et al. 1996).
# min_samples subido de 5 -> 10 por la dimensionalidad (~22 features).
dbscan_params:
  eps: auto
  min_samples: 10
  eps_percentile: 90

# HDBSCAN: sin epsilon manual para preservar su seleccion automatica
# de densidad (razon por la que se incluye frente a DBSCAN).
# cluster_selection_epsilon=0.0 -> neutro (no fuerza corte manual).
# min_cluster_size subido de 30 -> 50 para reducir fragmentacion
# con ~100k latidos.
hdbscan_params:
  min_cluster_size: 50
  min_samples: 10
  cluster_selection_epsilon: 0.0

# Autoencoder: capacidad aumentada para poder reconstruir la clase
# normal (condicion necesaria para que el error discrimine anomalias).
# Compresion 200 -> 16 (~12x), en linea con Yuan et al. 2020.
# epochs=100 con EarlyStopping (patience=5) que corta al converger.
#
# normal_fpr (antes "anomaly_rate"): presupuesto de FALSAS ALARMAS
# sobre la clase normal, NO la prevalencia del dataset. El nombre
# anterior era enganoso: el umbral se calcula sobre el fit set, que
# es 100% normal, de modo que "tasa de anomalia" no aplicaba.
autoencoder_params:
  encoding_dim: 16
  hidden_layers: [64, 32]
  epochs: 100
  batch_size: 256
  normal_fpr: 0.105
  learning_rate: 0.001
  random_state: 42

# Salida
output_dir: ./results
generate_plots: true
logging_level: INFO