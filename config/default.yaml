dataset_name: mitbih
dataset_path: BD2-20260218T192722Z-1-001/BD2

models:
  - kmeans
  - dbscan
  - hdbscan
  - autoencoder

# Representacion: "signal_pca" (Path A) o "manual_features" (Path B) con ventanas temporales
representation: manual_features

# Senal ECG
sampling_rate: 360
before_r_samples: 90
after_r_samples: 110
filter_lowcut: 0.5
filter_highcut: 40.0
filter_order: 4

# PCA (Path A)
pca_variance_threshold: 0.95

# Registros excluidos (ritmos de marcapasos - recomendacion AAMI)
excluded_records:
  - "102"
  - "104"
  - "107"
  - "217"

# Hiperparametros de modelos
kmeans_params:
  n_clusters: 10
  random_state: 42
  n_init: 20
  distance_percentile: 85

dbscan_params:
  eps: auto
  min_samples: 5
  eps_percentile: 75

hdbscan_params:
  min_cluster_size: 30
  min_samples: 15
  cluster_selection_epsilon: 0.5

autoencoder_params:
  encoding_dim: 6
  hidden_layers: [10, 8]
  epochs: 30
  batch_size: 256
  anomaly_rate: 0.105
  learning_rate: 0.001

# Salida
output_dir: ./results
generate_plots: true
logging_level: INFO
