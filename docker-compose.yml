version: '3.9'

services:
  # ── API Backend ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ecg-api
    image: ecg-anomaly-api:latest
    ports:
      - "8000:8000"
    volumes:
      # Permite cambiar modelos sin reconstruir la imagen
      - ./models:/app/models:ro
    environment:
      MODEL_DIR: /app/models
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500"
      RATE_LIMIT_RPM: "60"
      PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Frontend estático (nginx) ──────────────────────────────────────────────
  frontend:
    image: nginx:1.25-alpine
    container_name: ecg-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: ecg-network
